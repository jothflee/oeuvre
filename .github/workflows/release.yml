name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  # Always build against uv's managed python-build-standalone, never the
  # runner's Homebrew/system Python. That interpreter statically bundles its
  # own Tcl/Tk, so the resulting app is fully self-contained — it carries no
  # dependency on system frameworks or /opt/homebrew libs that won't exist on
  # users' machines. (macos-latest ships Homebrew Python, which uv would
  # otherwise pick and produce a non-portable bundle.)
  UV_PYTHON_PREFERENCE: only-managed

jobs:
  # Pure-Python wheel + sdist (installable on any OS with `pip install`).
  dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-uv
      - run: uv build
      - uses: actions/upload-artifact@v5
        with:
          name: python-dist
          path: dist/*

  # Standalone, double-clickable bundles (no Python needed) per OS.
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, name: Oeuvre-macos }
          - { os: ubuntu-latest, name: Oeuvre-linux }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: System libraries (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0 python3-tk

      - uses: ./.github/actions/setup-uv

      - name: Install managed Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --python 3.12

      - name: Build .icns (macOS)
        if: runner.os == 'macOS'
        run: |
          set -e
          ICONSET=oeuvre.iconset; mkdir -p "$ICONSET"
          for s in 16 32 128 256 512; do
            sips -z $s $s oeuvre/assets/icon.png --out "$ICONSET/icon_${s}x${s}.png"
            d=$((s*2)); sips -z $d $d oeuvre/assets/icon.png --out "$ICONSET/icon_${s}x${s}@2x.png"
          done
          iconutil -c icns "$ICONSET" -o oeuvre/assets/oeuvre.icns

      - name: Bundle with PyInstaller
        run: |
          ICON=oeuvre/assets/icon.png
          [ "${{ runner.os }}" = "macOS" ] && ICON=oeuvre/assets/oeuvre.icns
          # tools/pyinstaller-hooks overrides the contrib astropy hook, which
          # otherwise force-imports astropy.visualization.wcsaxes (-> matplotlib
          # importorskip -> build abort). We only need astropy.io.fits.
          # _tkinter is statically linked into the uv python-build-standalone
          # interpreter (a builtin, not a .so), so PyInstaller's tkinter hook
          # never auto-triggers. Forcing it as a hidden import runs the hook
          # (bundling the Tcl/Tk data + runtime env setup); --collect-all tkinter
          # bundles the Python package. Without these the GUI crashes on launch
          # with "No module named 'tkinter'".
          uv run --python 3.12 --with pyinstaller pyinstaller --noconfirm --windowed --name Oeuvre --icon "$ICON" \
            --additional-hooks-dir tools/pyinstaller-hooks \
            --hidden-import _tkinter \
            --collect-all tkinter \
            --collect-data cv2 \
            --collect-data oeuvre \
            --exclude-module matplotlib \
            --exclude-module pytest \
            --exclude-module IPython \
            tools/launch.py

      - name: Verify bundle (tkinter + Tcl/Tk present)
        run: |
          find dist -type d -name tkinter | grep -q . \
            || { echo "ERROR: tkinter package missing from bundle"; exit 1; }
          find dist -name init.tcl | grep -q . \
            || { echo "ERROR: Tcl runtime (init.tcl) missing from bundle"; exit 1; }
          echo "OK: bundle contains the tkinter package and Tcl/Tk runtime."

      - name: Package
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            # Single-file, double-clickable .dmg with a drag-to-Applications layout.
            staging="$(mktemp -d)/Oeuvre"
            mkdir -p "$staging"
            cp -R dist/Oeuvre.app "$staging/Oeuvre.app"
            ln -s /Applications "$staging/Applications"
            hdiutil create -volname Oeuvre -srcfolder "$staging" \
              -ov -format UDZO "${{ matrix.name }}.dmg"
          else
            tar czf "${{ matrix.name }}.tar.gz" -C dist Oeuvre
          fi

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.dmg
            ${{ matrix.name }}.tar.gz
          if-no-files-found: ignore

  # Attach everything to the GitHub Release (tag pushes only).
  release:
    needs: [dist, bundle]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use GitHub's own CLI (preinstalled on runners) instead of a
          # third-party action. No checkout in this job, so target the repo
          # explicitly. --generate-notes mirrors the old auto release notes.
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            $(find artifacts -type f | sort)
